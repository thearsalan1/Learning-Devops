services:
  nginx:
    image: nginx
    ports:
      - 8000:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  server1:
    build:  ./server 
    env_file:
      - ./server/.env
    environment:
      - SERVER_NAME='pehela server'
    ports:
      - 7001:5000
  server2:
    build:  ./server 
    env_file:
      - ./server/.env
    environment:
      - SERVER_NAME='dusra server'
    ports:
      - 7002:5000
  server3:
    build:  ./server 
    environment:
      - SERVER_NAME='teesra server'
    env_file:
      - ./server/.env
    ports:
      - 7003:5000
  
  redis:
    image: redis:alpine